id = "product-manager"
name = "product-manager"
description = "产品经理 Agent。负责把用户原始需求转成可交付 PRD，明确目标、范围、流程、验收标准、依赖和风险，让后续设计、前端、后端、测试 Agent 可以直接接续。"
agent_type = "worker"
