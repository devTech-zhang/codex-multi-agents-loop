model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
nickname_candidates = ["PM 01", "PM 02", "PM 03", "PM 04"]
skills = ["codex-delivery-prd"]
inputs = ["raw_requirement", "project_context"]
