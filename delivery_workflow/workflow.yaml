{
  "id": "delivery-workflow",
  "name": "通用软件交付流程",
  "version": "1.1.0",
  "steps": [
    {
      "id": "requirement-intake",
      "name": "需求录入 Gate",
      "category": "interactive",
      "executor": "gate",
      "ref": "references/01-requirement-intake.md",
      "gate": {
        "kind": "input",
        "schema": {
          "project_name": {"type": "string", "required": true},
          "requirement_summary": {"type": "string", "required": true},
          "business_goal": {"type": "string", "required": true},
          "requires_frontend": {"type": "boolean", "required": true},
          "requires_backend": {"type": "boolean", "required": true}
        }
      },
      "next": {"default": "prd-v1"}
    },
    {
      "id": "prd-v1",
      "name": "生成 PRD v1",
      "category": "automated",
      "executor": "agent",
      "agent": "product_manager",
      "artifact_category": "prd",
      "ref": "references/02-prd-v1.md",
      "inputs": ["raw_requirement", "project_context", "requirement-intake_gate"],
      "outputs": ["prd_v1"],
      "next": {"default": "prd-validation"}
    },
    {
      "id": "prd-validation",
      "name": "PRD 确定性校验",
      "category": "automated",
      "executor": "validator",
      "requires": ["prd_v1"],
      "outputs": ["prd_validation"],
      "next": {"default": "multi-role-review", "failed": "prd-v1"}
    },
    {
      "id": "multi-role-review",
      "name": "多角色需求评审",
      "category": "automated",
      "executor": "agent",
      "agent": "review_board",
      "artifact_category": "review",
      "ref": "references/03-multi-role-review.md",
      "inputs": ["prd_v1"],
      "outputs": ["requirement_review_report"],
      "next": {"default": "review-summary"}
    },
    {
      "id": "review-summary",
      "name": "评审意见汇总与最终 PRD",
      "category": "automated",
      "executor": "agent",
      "agent": "product_manager",
      "artifact_category": "prd",
      "ref": "references/04-review-summary.md",
      "inputs": ["prd_v1", "requirement_review_report", "development-doc-confirmation_gate"],
      "outputs": ["prd_v2"],
      "next": {"default": "ui-design-spec"}
    },
    {
      "id": "ui-design-spec",
      "name": "UI 设计规范",
      "category": "automated",
      "executor": "agent",
      "agent": "ui_designer",
      "artifact_category": "ui",
      "ref": "references/06-ui-design-spec.md",
      "inputs": ["prd_v2"],
      "outputs": ["ui_design_spec"],
      "next": {"default": "frontend-tech-design"}
    },
    {
      "id": "frontend-tech-design",
      "name": "前端技术方案",
      "category": "automated",
      "executor": "agent",
      "agent": "frontend_engineer",
      "artifact_category": "tech",
      "ref": "references/08-frontend-tech-design.md",
      "inputs": ["prd_v2", "ui_design_spec"],
      "outputs": ["frontend_tech_design"],
      "next": {"default": "backend-tech-design"}
    },
    {
      "id": "backend-tech-design",
      "name": "后端技术方案",
      "category": "automated",
      "executor": "agent",
      "agent": "backend_engineer",
      "artifact_category": "tech",
      "ref": "references/09-backend-tech-design.md",
      "inputs": ["prd_v2"],
      "outputs": ["backend_tech_design"],
      "next": {"default": "smoke-test-case-design"}
    },
    {
      "id": "smoke-test-case-design",
      "name": "QA 生成冒烟测试用例",
      "category": "automated",
      "executor": "agent",
      "agent": "qa_engineer",
      "artifact_category": "test",
      "ref": "references/15-smoke-test-case-design.md",
      "inputs": ["prd_v2", "ui_design_spec", "frontend_tech_design", "backend_tech_design"],
      "outputs": ["smoke_test_cases"],
      "next": {"default": "publish-prd-doc"}
    },
    {
      "id": "publish-prd-doc",
      "name": "发布飞书 PRD 文档",
      "category": "automated",
      "executor": "lark-doc",
      "source_artifact": "prd_v2",
      "output_artifact": "prd_lark_doc",
      "title_template": "{project_title} PRD",
      "next": {"default": "publish-ui-design-spec-doc"}
    },
    {
      "id": "publish-ui-design-spec-doc",
      "name": "发布飞书 UI 设计规范文档",
      "category": "automated",
      "executor": "lark-doc",
      "source_artifact": "ui_design_spec",
      "output_artifact": "ui_design_spec_lark_doc",
      "title_template": "{project_title} UI 设计规范",
      "next": {"default": "publish-frontend-tech-doc"}
    },
    {
      "id": "publish-frontend-tech-doc",
      "name": "发布飞书前端技术方案文档",
      "category": "automated",
      "executor": "lark-doc",
      "source_artifact": "frontend_tech_design",
      "output_artifact": "frontend_tech_design_lark_doc",
      "title_template": "{project_title} 前端技术方案",
      "next": {"default": "publish-backend-tech-doc"}
    },
    {
      "id": "publish-backend-tech-doc",
      "name": "发布飞书后端技术方案文档",
      "category": "automated",
      "executor": "lark-doc",
      "source_artifact": "backend_tech_design",
      "output_artifact": "backend_tech_design_lark_doc",
      "title_template": "{project_title} 后端技术方案",
      "next": {"default": "publish-smoke-test-cases-doc"}
    },
    {
      "id": "publish-smoke-test-cases-doc",
      "name": "发布飞书冒烟测试用例文档",
      "category": "automated",
      "executor": "lark-doc",
      "source_artifact": "smoke_test_cases",
      "output_artifact": "smoke_test_cases_lark_doc",
      "title_template": "{project_title} 冒烟测试用例",
      "next": {"default": "development-doc-confirmation"}
    },
    {
      "id": "development-doc-confirmation",
      "name": "开发前资料确认 Gate",
      "category": "interactive",
      "executor": "gate",
      "ref": "references/07-development-doc-confirmation.md",
      "gate": {
        "kind": "approval",
        "schema": {
          "approved": {"type": "boolean", "required": true},
          "approver": {"type": "string", "required": true},
          "comment": {"type": "string", "required": false}
        },
        "actions": ["approve", "reject"]
      },
      "next": {"approved": "frontend-development", "rejected": "review-summary"}
    },
    {
      "id": "frontend-development",
      "name": "前端开发执行",
      "category": "automated",
      "executor": "dev-runner",
      "ref": "references/13-frontend-development.md",
      "inputs": ["prd_v2", "smoke_test_cases", "frontend_tech_design", "ui_design_spec"],
      "outputs": ["frontend_dev_result"],
      "next": {"default": "backend-development"}
    },
    {
      "id": "backend-development",
      "name": "后端开发执行",
      "category": "automated",
      "executor": "dev-runner",
      "ref": "references/14-backend-development.md",
      "inputs": ["prd_v2", "smoke_test_cases", "backend_tech_design"],
      "outputs": ["backend_dev_result"],
      "next": {"default": "frontend-backend-integration"}
    },
    {
      "id": "frontend-backend-integration",
      "name": "前后端联调",
      "category": "automated",
      "executor": "dev-runner",
      "ref": "references/15-frontend-backend-integration.md",
      "inputs": ["prd_v2", "frontend_dev_result", "backend_dev_result"],
      "outputs": ["integration_test_result"],
      "next": {"default": "development-smoke-self-test"}
    },
    {
      "id": "development-smoke-self-test",
      "name": "前后端开发冒烟自测",
      "category": "automated",
      "executor": "dev-runner",
      "ref": "references/16-development-smoke-self-test.md",
      "inputs": ["prd_v2", "ui_design_spec", "frontend_tech_design", "backend_tech_design", "smoke_test_cases", "frontend_dev_result", "backend_dev_result", "integration_test_result"],
      "outputs": ["development_smoke_self_test_report"],
      "next": {"default": "qa-system-testing"}
    },
    {
      "id": "qa-system-testing",
      "name": "QA 系统测试",
      "category": "automated",
      "executor": "dev-runner",
      "ref": "references/17-qa-system-testing.md",
      "inputs": ["prd_v2", "ui_design_spec", "frontend_tech_design", "backend_tech_design", "smoke_test_cases", "development_smoke_self_test_report", "frontend_dev_result", "backend_dev_result", "integration_test_result"],
      "outputs": ["qa_system_test_result"],
      "next": {"default": "qa-test-report", "failed": "bug-fix"}
    },
    {
      "id": "bug-fix",
      "name": "修复 Bug",
      "category": "automated",
      "executor": "dev-runner",
      "ref": "references/17-bug-fix.md",
      "inputs": ["manual_bug_fix_request", "prd_v2", "ui_design_spec", "frontend_tech_design", "backend_tech_design", "smoke_test_cases", "development_smoke_self_test_report", "qa_system_test_result", "qa_regression_test_result", "frontend_dev_result", "backend_dev_result", "bug_fix_result"],
      "outputs": ["bug_fix_result"],
      "next": {"default": "qa-regression-testing"}
    },
    {
      "id": "qa-regression-testing",
      "name": "QA 回归测试",
      "category": "automated",
      "executor": "dev-runner",
      "ref": "references/19-qa-regression-testing.md",
      "inputs": ["prd_v2", "ui_design_spec", "frontend_tech_design", "backend_tech_design", "smoke_test_cases", "development_smoke_self_test_report", "qa_system_test_result", "bug_fix_result", "frontend_dev_result", "backend_dev_result"],
      "outputs": ["qa_regression_test_result"],
      "next": {"default": "qa-test-report", "failed": "bug-fix"}
    },
    {
      "id": "qa-test-report",
      "name": "QA 生成测试报告",
      "category": "automated",
      "executor": "agent",
      "agent": "qa_engineer",
      "artifact_category": "test",
      "ref": "references/20-qa-test-report.md",
      "inputs": ["prd_v2", "smoke_test_cases", "development_smoke_self_test_report", "qa_system_test_result", "qa_regression_test_result", "bug_fix_result"],
      "outputs": ["test_report"],
      "next": {"default": "publish-test-report-doc"}
    },
    {
      "id": "publish-test-report-doc",
      "name": "发布飞书测试报告文档",
      "category": "automated",
      "executor": "lark-doc",
      "source_artifact": "test_report",
      "output_artifact": "test_report_lark_doc",
      "title_template": "{project_title} 测试报告",
      "next": {"default": "final-report"}
    },
    {
      "id": "final-report",
      "name": "最终交付报告",
      "category": "automated",
      "executor": "agent",
      "agent": "delivery_manager",
      "artifact_category": "release",
      "ref": "references/21-final-report.md",
      "inputs": ["prd_v2", "frontend_dev_result", "backend_dev_result", "integration_test_result", "development_smoke_self_test_report", "test_report", "bug_fix_result"],
      "outputs": ["final_delivery_report"],
      "next": {"default": "publish-final-report-doc"}
    },
    {
      "id": "publish-final-report-doc",
      "name": "发布飞书最终报告文档",
      "category": "automated",
      "executor": "lark-doc",
      "source_artifact": "final_delivery_report",
      "output_artifact": "final_report_lark_doc",
      "title_template": "{project_title} 最终交付报告",
      "next": {"default": "delivery-notification"}
    },
    {
      "id": "delivery-notification",
      "name": "交付完成通知",
      "category": "notification",
      "executor": "notify",
      "message": "软件交付 workflow 已完成，已发布最终交付报告。",
      "next": {}
    }
  ]
}
