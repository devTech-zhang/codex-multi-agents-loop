id = "codex-delivery-workflow"
name = "Codex 交付工作流"
version = "0.1.0"

[[steps]]
id = "product-manager"
name = "产品需求整理 V1"
category = "automated"
executor = "agent"
agent = "product-manager"
artifact_category = "product"
inputs = ["raw_requirement", "project_context"]
outputs = ["prd"]

[[steps]]
id = "ui-designer"
name = "UI 设计规范"
category = "automated"
executor = "agent"
agent = "ui-designer"
artifact_category = "design"
inputs = ["prd"]
outputs = ["design_spec"]
next = { default = "frontend-impl" }

[[steps]]
id = "frontend-impl"
name = "前端实现"
category = "automated"
executor = "agent"
agent = "frontend-impl"
artifact_category = "implementation"
inputs = ["prd", "design_spec"]
outputs = ["frontend_result"]
next = { default = "backend-impl" }

[[steps]]
id = "backend-impl"
name = "后端实现"
category = "automated"
executor = "agent"
agent = "backend-impl"
artifact_category = "implementation"
inputs = ["prd"]
outputs = ["backend_result"]
next = { default = "qa-tester" }

[[steps]]
id = "qa-tester"
name = "QA 验证"
category = "automated"
executor = "agent"
agent = "qa-tester"
artifact_category = "qa"
inputs = ["prd", "design_spec", "frontend_result", "backend_result"]
outputs = ["qa_report"]
